<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>AccessRío</title>
	<style>
		html,
		body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #ffffff;
		}

		#content-frame {
			border: 0;
			width: 100%;
			height: 100%;
			display: block;
		}
	</style>
</head>
<body>
	<iframe id="content-frame" title="AccessRío Portal"></iframe>

	<script>
		const url1  = "https://manuhal.github.io/exp-dev/pages/accessrio.html";
		const url2 = "https://manuhal.github.io/exp-dev/pages/accessrio-june1.html";

		// Uses browser local time. After this timestamp, the iframe uses urlAfterCutoff.
		const switchAt = new Date("2026-05-20T00:01:00"); //for testing
        // const switchAt = new Date("2026-06-01T00:00:00"); // use this for real switch on June 1st, 2026
		const iframe = document.getElementById("content-frame");
		const now = new Date();

		if (now < switchAt) {
			iframe.src = url1;

			const msUntilSwitch = switchAt.getTime() - now.getTime();
			window.setTimeout(() => {
				iframe.src = url2;
			}, msUntilSwitch);
		} else {
			iframe.src = url2;
		}
	</script>
</body>
</html>
