<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AccessRío Portal</title>

	<style>
		:root {
			--rio-gold: #f9c900;
			--rio-dark-gray: #414042;
			--rio-med-blue: #2A96C6;
			--rio-green: #33A961;
			--text: #ffffff;

			--rio-green-rgb: 51, 169, 97;
			--rio-med-blue-rgb: 42, 150, 198;
			--topbar-height: 10vh;
		}

		body {
			font-family: "Source Sans 3", "Segoe UI", system-ui, -apple-system,
				BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif;
			background: var(--rio-dark-gray);
			color: var(--text);
			height: 100vh;
			display: flex;
			flex-direction: column;
			margin: 0;
			padding: 0;
		}

		.skip-link {
			position: absolute;
			left: 1rem;
			top: -3rem;
			z-index: 2000;
			background: #ffffff;
			color: #000000;
			padding: 0.5rem 0.75rem;
			border-radius: 0.25rem;
			text-decoration: none;
			font-weight: 600;
		}

		.skip-link:focus {
			top: 0.75rem;
		}

		.top-bar {
			height: var(--topbar-height);
			background: var(--rio-dark-gray);
			border-bottom: 1px solid rgba(255, 255, 255, 0.2);
			z-index: 1030;
			flex-shrink: 0;
		}

		#main-content {
			flex: 1;
			display: flex;
			flex-direction: column;
			padding-top: var(--topbar-height);
		}

		.main-panels {
			flex: 1;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.main-panels .col-12 {
			display: flex;
			flex: 1;
		}

		.portal-panel {
			position: relative;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			overflow: hidden;
			/* Flexible height to fill available space */
			flex: 1;
			padding: 1.25rem 0;
			text-decoration: none;
			color: var(--text);
		}

		.old-link-section {
			background: linear-gradient(135deg, rgba(51, 169, 97, 0.1) 0%, rgba(42, 150, 198, 0.1) 100%);
			border-top: 1px solid rgba(255, 255, 255, 0.15);
			padding: 1rem 1.5rem;
			text-align: center;
			color: rgba(255, 255, 255, 0.9);
			flex-shrink: 0;
		}

		.old-link-section p {
			font-size: 1.1rem;
			margin-bottom: 0;
			line-height: 1.4;
			color: rgba(255, 255, 255, 0.85);
		}

		.old-link-btn {
			color: #ffffff;
			text-decoration: underline;
			font-weight: 500;
			transition: opacity 0.3s ease;
		}

		.old-link-btn:hover {
			opacity: 0.8;
		}

		.portal-panel:focus-visible {
			outline: 4px solid var(--rio-gold);
			outline-offset: -4px;
		}

		.panel-image {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			transform: scale(1);
			transition: transform 0.7s ease;
		}

		.portal-panel:hover .panel-image {
			transform: scale(1.05);
		}

		.panel-overlay {
			position: absolute;
			inset: 0;
			transition: background-color 0.3s ease;
		}

		.overlay-green {
			background: rgba(var(--rio-green-rgb), 0.9);
		}

		/* Hover keeps overlay >= 0.85 so text contrast stays above the 3:1 large-text bar (WCAG 1.4.3) */
		.portal-panel:hover .overlay-green {
			background: rgba(var(--rio-green-rgb), 0.85);
		}

		.panel-content {
			position: relative;
			z-index: 2;
			padding: 1.5rem;
		}

		.panel-badge {
			display: inline-block;
			background-color: #1a1a1a;
			color: #fff;
			font-size: 1.05rem;
			font-weight: 700;
			letter-spacing: 3px;
			text-transform: uppercase;
			padding: 6px 24px;
			border-radius: 9999px;
			box-shadow: 0 10px 15px -3px rgb(0 0 0 / 40%);
		}

		.panel-title {
			font-size: 3rem;
			font-weight: 900;
			letter-spacing: -0.04em;
			line-height: 1.1;
			margin-top: 1.5rem;
			margin-bottom: 0;
			text-transform: uppercase;
			text-shadow: 0 4px 12px rgba(0, 0, 0, 0.45), 0 2px 4px rgba(0, 0, 0, 0.35);
		}

		.panel-subtitle {
			font-size: 2rem;
			font-weight: 300;
			margin-top: 0.5rem;
			margin-bottom: 0;
			text-shadow: 0 3px 8px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3);
		}

		@media (min-width: 768px) {
			.panel-title {
				font-size: 4rem;
			}

			.panel-subtitle {
				font-size: 2.3rem;
			}
		}

		@media (min-width: 992px) {
			.panel-badge {
				padding: 10px 32px;
			}

			.portal-panel {
				min-height: calc(100dvh - var(--topbar-height));
			}

			.panel-title {
				font-size: 4.8rem;
			}

			.panel-subtitle {
				font-size: 2.5rem;
			}
		}

		@media (prefers-reduced-motion: reduce) {

			.panel-image,
			.panel-overlay {
				transition: none;
			}
		}
	</style>
</head>

<body>
	<!-- Google Tag Manager (noscript) -->
	<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K4H4CS9S" title="Google Tag Manager" height="0"
			width="0" style="display:none;visibility:hidden"></iframe></noscript>
	<!-- End Google Tag Manager (noscript) -->

	<a class="skip-link" href="#main-content">Skip to main content</a>

	<header class="top-bar fixed-top d-flex align-items-center justify-content-center">
		<img src="https://www.riohondo.edu/wp-content/uploads/2023/08/AccessRIO.png" alt="AccessRío" style="height: 40px;">
	</header>

	<main id="main-content" class="container-fluid p-0" tabindex="-1">
		<h1 class="visually-hidden">AccessRío Portal</h1>
		<div class="row g-0 main-panels">
			<div class="col-12">
				<a href="https://experience.elluciancloud.com/rhc?utm_source=pickpage&utm_medium=website&utm_campaign=new_accessrio_promo"
					class="portal-panel left">
					<img src="https://page.riohondo.edu/wp-content/uploads/2026/05/upcoming-accessrio-noid-nosurvey.webp" alt=""
						class="panel-image">
					<div class="panel-overlay overlay-green"></div>
					<div class="panel-content">
						<span class="panel-badge">Visit</span>
						<h2 class="panel-title">AccessRío<span class="visually-hidden"> Portal</span></h2>
						<p class="panel-subtitle">Welcome to Your Portal</p>
					</div>
				</a>
			</div>
		</div>

		<section class="old-link-section">
			<p>We've upgraded to a new and improved AccessRío Portal experience. If you need to access the old version, you can still <a href="https://accessrio.riohondo.edu" class="old-link-btn">visit it here</a>.</p>
		</section>
	</main>

</body>
