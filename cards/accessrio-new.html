<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AccessRío</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://rio-hondo-college-public.github.io/static/css/rhc-main.css">

	<style>
		:root {
			--overlay-color: #f9c900;
		}

		body {
			margin: 0;
			padding: 0;
		}

		.hero {
			min-height: 100vh;
			background: url('https://page.riohondo.edu/wp-content/uploads/2026/05/upcoming-accessrio.webp') center center / cover no-repeat;
			position: relative;
			display: flex;
			align-items: center;
			justify-content: center;
			color: #ffffff;
			text-decoration: none;
			cursor: pointer;
			transition: all 0.4s ease;
			overflow: hidden;
		}

		/* overlay */
		.hero::before {
			content: "";
			position: absolute;
			inset: 0;
			background-color: rgba(var(--rio-med-blue-rgb), 0.9);
			z-index: 1;
			transition: background-color 0.4s ease;
		}

		.hero:hover::before {
			background-color: rgba(var(--rio-med-blue-rgb), 0.8);
		}

		.hero:hover .container {
			transform: scale(1.05);
		}

		.hero p {
			max-width: 720px;
			margin: 1.5rem auto;
			transition: color 0.3s ease;
		}

		.container {
			width: 100%;
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 1rem;
			margin: 1rem;
			position: relative;
			z-index: 99;
			transition: transform 0.35s ease;
			transform-origin: center center;
		}

		.container img {
			max-width: 300px;
			height: auto;
		}

		@media (max-width: 360px) {
			.container img {
				max-width: 230px;
			}
		}
	</style>
</head>

<body>
	<main>
		<a href="https://accessrio.riohondo.edu" target="_blank" rel="noopener noreferrer" class="hero text-center"
			title="Preview the new AccessRío Portal">
			<div class="container">
				<img src="https://www.riohondo.edu/wp-content/uploads/2023/08/AccessRIO.png" alt="AccessRío Logo"
					style="margin-bottom: 0.5rem;">
				<p class="py-0 my-0">Preview the new AccessRío portal</p>
			</div>
		</a>
	</main>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
