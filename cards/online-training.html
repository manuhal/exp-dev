<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kronos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/rhc-main.css">

  <style>
    .hero {
      min-height: 100vh;
      background: url('../static/img/online-training.webp') center center / cover no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      color: var(--rio-dark-gray, #333);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.85);
      z-index: 1;
    }

    .hero p {
      max-width: 720px;
      margin: 1.5rem auto;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      /* padding: 75px 0; */
    }

    a img {
      transition: transform 0.3s ease;
    }

    a:hover img {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <section class="hero text-center">
    <div class="container">

      <a href="https://riohondo-keenan.safecolleges.com/login" target="_blank" rel="noopener noreferrer"
        title="Visit Keenan Training Website">
        <img src="../static/img/Keenan_TRAIN.png" alt="Keenan Training Logo" style="max-width: 300px; height: auto;">
      </a>
      <p class="lead fw-normal mb-5">Access online training resources and courses website.</p>
      <!-- <a href="https://secure6.saashr.com/ta/6177719.login" target="_blank" rel="noopener noreferrer"
        class="btn btn-primary btn-md px-5 py-2 fw-bold fs-5" title="Login to UKG/KRONO">
        <img src="../static/img/Keenan_TRAIN.png" alt="Keenan Training Logo" style="max-width: 300px; height: auto;">
      </a> -->
    </div>
  </section>


  <script>
    const phrases = [
      "Welcome", //eng
      "Bienvenido", //spa
      "欢迎", //chi
      "환영합니다", //kor
      "Selamat Datang" //ind
    ];

    new Typed('#typed', {
      strings: phrases,
      typeSpeed: 100,
      backSpeed: 40,
      backDelay: 1200,
      startDelay: 300,
      loop: true,
      showCursor: false,
      cursorChar: '|',
      smartBackspace: false
    });
  </script>
  <!-- Bootstrap JS (optional - only if you need dropdowns, modals, etc) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
