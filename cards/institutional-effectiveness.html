<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RHC Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/rhc-main.css">

  <style>
    .hero {
      min-height: 100vh;
      background: url('../static/img/campus-drone.webp') center center / cover no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      color: var(--rio-dark-gray, #333);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      /* overlay color */
      background: rgba(var(--rio-green-rgb), 0.8);
      z-index: 1;
    }

    .hero p {
      max-width: 720px;
      margin: 1.5rem auto;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 100%;
      padding-left: 0;
      padding-right: 0;
      /* padding: 75px 0; */
    }

    .list-group {
      border-radius: 0;
      border-left-width: 0;
    }

    .list-group-item {
      background: rgba(255, 255, 255, 0);
      color: var(--light-text);
      border-left: 0;
      border-right: 0;
      padding: 0.5rem 1.5rem;
    }

    .list-group-item:hover {
      /* hover color */
      background: rgba(var(--rio-green-rgb), 0.6);
      color: var(--light-text);
    }

    .list-group-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .list-group-item i {
      flex-shrink: 0;
    }

    .list-group-item-text {
      flex: 1;
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="container">
      <div class="list-group">
        <!-- IE resources -->
        <a href="https://riohondo0.sharepoint.com/sites/IECampusResources" target="_blank" rel="noopener noreferrer"
          class="list-group-item list-group-item-action">
          <i class="fas fa-certificate"></i>
          <span class="list-group-item-text">Accreditation</span>
        </a>
        <a href="https://riohondo0.sharepoint.com/sites/IECampusResources" target="_blank" rel="noopener noreferrer"
          class="list-group-item list-group-item-action">
          <i class="fas fa-bullseye"></i>
          <span class="list-group-item-text">Institutional Goals &amp; Objectives</span>
        </a>
        <a href="https://riohondo0.sharepoint.com/sites/IECampusResources" target="_blank" rel="noopener noreferrer"
          class="list-group-item list-group-item-action">
          <i class="fas fa-calendar-alt"></i>
          <span class="list-group-item-text">Planning &amp; Program Review</span>
        </a>
        <a href="https://riohondo0.sharepoint.com/sites/IECampusResources" target="_blank" rel="noopener noreferrer"
          class="list-group-item list-group-item-action">
          <i class="fas fa-search"></i>
          <span class="list-group-item-text">Research (Including Tableau Dashboards)</span>
        </a>
        <a href="https://www.riohondo.edu/irp/research-request/" target="_blank" rel="noopener noreferrer"
          class="list-group-item list-group-item-action">
          <i class="fas fa-clipboard-list"></i>
          <span class="list-group-item-text">Survey &amp; Research Request Forms</span>
        </a>
        <!-- <a href="https://www.dropbox.com/sh/gmdr8xz196ycewa/AADLZWYphXl6UwI8c-4kpalEa?dl=0" target="_blank" rel="noopener noreferrer" class="list-group-item list-group-item-action">
          <i class="fas fa-history"></i>
          <span class="list-group-item-text">IEC Agendas &amp; Minutes 2014-2019</span>
        </a> -->
        <a href="https://go.boarddocs.com/ca/riohondo/Board.nsf/goto?open&amp;id=BS8L4D54B7B9" target="_blank"
          rel="noopener noreferrer" class="list-group-item list-group-item-action">
          <i class="fas fa-book-open"></i>
          <span class="list-group-item-text">IEC Agendas &amp; Minutes 2020-Current</span>
        </a>
        <a href="https://w.taskstream.com/SingleSignOnSaml/Login/C6CA7BB83551A913020511A55328464E" target="_blank"
          rel="noopener noreferrer" class="list-group-item list-group-item-action">
          <i class="fas fa-tasks"></i>
          <span class="list-group-item-text">Taskstream</span>
        </a>

      </div>
    </div>
  </section>

  <!-- Bootstrap JS (optional - only if you need dropdowns, modals, etc) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
