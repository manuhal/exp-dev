<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RHC Card</title>
  <script src="../static/js/main.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../static/css/rhc-main.css">

  <style>
    .hero {
      min-height: 100vh;
      background: url('../static/img/forms.jpg') center center / cover no-repeat;
      position: relative;
      display: flex;
      align-items: flex-start;
      color: var(--rio-dark-gray, #333);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      /* overlay color */
      background: rgba(var(--rio-dark-blue-rgb), 0.8);
      z-index: 1;
    }

    .hero p {
      max-width: 720px;
      margin: 1.5rem auto;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 100%;
      padding-left: 0;
      padding-right: 0;
      /* padding: 75px 0; */
    }

    .list-group {
      border-radius: 0;
      border-left-width: 0;
    }

    .list-group-item {
      background: rgba(255, 255, 255, 0);
      color: var(--light-text);
      border-left: 0;
      border-right: 0;
      padding: 0.5rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .list-group-item i {
      flex-shrink: 0;
    }

    .list-group-item-text {
      flex: 1;
    }

    .list-group-item:hover {
      /* hover color */
      background: rgba(var(--rio-med-blue-rgb), 0.5);
      color: var(--light-text);
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="container">
      <div class="list-group">
        <a href="https://www.riohondo.edu/wp-content/uploads/2026/01/Transmittal-Academic_06.27.22.pdf" target="_blank" rel="noopener noreferrer" class="list-group-item list-group-item-action"
        title="Academic Employment Transmittal">
          <i class="fas fa-file-alt me-2"></i>
          Academic Employment Transmittal
        </a>
        <a href="https://www.riohondo.edu/wp-content/uploads/2026/01/budget_transfer.pdf" target="_blank"
          rel="noopener noreferrer" class="list-group-item list-group-item-action" 
          title="Budget Transfer">
          <i class="fas fa-file-alt me-2"></i>
          Budget Transfer
        </a>
        <a href="https://www.riohondo.edu/wp-content/uploads/2026/01/Transmittal-Classified_02.28.22.pdf"
          target="_blank" rel="noopener noreferrer" class="list-group-item list-group-item-action" title="Classified Employment Transmittal">
          <i class="fas fa-file-alt me-2"></i>
          Classified Employment Transmittal
        </a>
        <a href="https://www.riohondo.edu/wp-content/uploads/2026/01/ConferenceReport.doc" target="_blank"
          rel="noopener noreferrer" class="list-group-item list-group-item-action" 
          title="Conference Report">
          <i class="fas fa-file-alt me-2"></i>
          Conference Report
        </a>
        <a href="https://www.riohondo.edu/wp-content/uploads/2026/01/RHC-Request-for-Travel-Authorization-Rev.-Sept.-2019.pdf"
          target="_blank" rel="noopener noreferrer" class="list-group-item list-group-item-action" 
          title="Travel Authorization">
          <i class="fas fa-file-alt me-2"></i>
          Travel Authorization
        </a>
        <a href="https://www.riohondo.edu/wp-content/uploads/2026/01/Request-Mileage-Allowance-and-Payment-Fillable-form-rvsd.-1.18.23.pdf"
          target="_blank" rel="noopener noreferrer" class="list-group-item list-group-item-action" 
          title="Travel Reimbursement">
          <i class="fas fa-file-alt me-2"></i>
          Travel Reimbursement
        </a>
        <a href="https://www.riohondo.edu/wp-content/uploads/2026/01/Unusual-Occurrence-Report.pdf" target="_blank"
          rel="noopener noreferrer" class="list-group-item list-group-item-action" 
          title="Unusual Occurrence Report">
          <i class="fas fa-file-alt me-2"></i>
          Unusual Occurrence Report
        </a>
      </div>
    </div>
  </section>

  <!-- Bootstrap JS (optional - only if you need dropdowns, modals, etc) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
