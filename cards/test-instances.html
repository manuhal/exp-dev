<!doctype html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RHC Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="../static/css/rhc-main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    main {
      padding: 1rem 0.75rem;
      /* very tight for mobile widgets */
      max-width: 1400px;
      margin: auto;
    }

    .launch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      /* fits 3 at ~370px+ */
      gap: 0.75rem;
      /* smaller gap saves space */
    }

    .launch-card {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      height: 100%;
      cursor: pointer;
      border-radius: 0.6rem;
      overflow: hidden;
      /* clean edges if shadow clips */
    }

    .launch-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }

    .launch-card:hover .card-icon {
      color: rgba(var(--bs-primary-rgb), 0.75);
      transform: scale(1.12);
    }

    .card-body {
      text-align: center;
      padding: 1rem 0.5rem;
      /* much tighter padding */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      min-height: 110px;
      /* consistent small height */
    }

    .card-icon {
      font-size: 2.6rem;
      /* smaller icon for narrow cards */
      margin-bottom: 0.6rem;
      color: var(--bs-primary);
      display: block;
    }

    .card-title {
      margin: 0;
      font-size: 1rem;
      /* readable but compact */
      color: var(--bs-body-color);
      line-height: 1.25;
      font-weight: 500;
      /* slight emphasis helps legibility */
    }

    .card-link {
      text-decoration: none;
      color: inherit;
      display: block;
      height: 100%;
    }

    /* Super-narrow phones / very tight Ellucian card embed */
    @media (max-width: 400px) {
      .launch-grid {
        grid-template-columns: repeat(auto-fit, minmax(105px, 1fr));
        gap: 0.6rem;
      }

      .card-icon {
        font-size: 2.4rem;
      }

      .card-body {
        padding: 0.9rem 0.4rem;
        min-height: 100px;
      }

      .card-title {
        font-size: 0.95rem;
      }
    }

    /* Optional: force 3 even earlier if Ellucian forces extreme narrowness */
    @media (min-width: 370px) and (max-width: 500px) {
      .launch-grid {
        grid-template-columns: repeat(3, 1fr);
        /* hard 3-col lock in this range */
      }
    }
  </style>
</head>
