<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Banner</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<link rel="stylesheet" href="https://rio-hondo-college-public.github.io/static/css/rhc-main.css">

	<style>
		body {
			margin: 0;
			padding: 0;
		}

		.hero {
			min-height: 100vh;
			background-color: var(--rio-dark-blue);
			position: relative;
			display: flex;
			align-items: center;
			color: #ffffff;
			text-decoration: none;
			cursor: pointer;
			transition: all 0.4s ease;
		}

		.hero:hover {
			background-color: #2B7187;
			/* fallback */
			background-color: color-mix(in srgb, var(--rio-dark-blue) 80%, var(--rio-green) 20%);
		}

		.hero:hover .icon-circle {
			transform: scale(1.08);
			box-shadow: 0 8px 24px rgba(255, 215, 0, 0.2);
		}

		.hero:hover p {
			color: #ffffff;
		}

		.hero p {
			margin: 1rem auto;
			transition: color 0.3s ease;
			overflow-wrap: anywhere;
		}

		.icon-circle {
			width: 85px;
			height: 85px;
			background-color: var(--rio-gold, #FFD700);
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			margin-bottom: 0.5rem;
			transition: all 0.3s ease;
		}

		.icon-circle i {
			font-size: 3rem;
			color: var(--rio-dark-gray, #333);

		}
	</style>
</head>

<body>
	<main>
		<a id="banner-link" href="#" target="_blank" rel="noopener noreferrer" class="hero text-center"
			title="Login to Banner">
			<div class="container">
				<div class="icon-circle">
					<i class="fas fa-link card-icon" aria-hidden="true"></i>

				</div>
				<p class="small mt-2 mb-0"><strong>Parent URL:</strong> <span id="parent-url"></span></p>
				<p class="small mt-2 mb-0"><strong>Link:</strong> <span id="url-link"></span></p>
				<p class="small mt-2 mb-0"><strong>Env:</strong> <span id="env"></span> <br> <strong>Method:</strong> <span id="method-url"></span></p>
			</div>
		</a>
	</main>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

	<script>
		const bannerLink = document.getElementById("banner-link");
		const parentUrlEl = document.getElementById("parent-url");
		const urlLinkEl = document.getElementById("url-link");
		const envEl = document.getElementById("env");
		const methodEl = document.getElementById("method-url");
		const urlProd = "https://prod-ban9-appnav.riohondo.edu:8443/applicationNavigator/seamless";
		const urlTest = "https://dev-appnav.riohondo.edu:8443/applicationNavigator/seamless";

		function getParentContext() {
			const referrer = document.referrer;
			if (referrer) {
				return { url: referrer, method: "Referrer" };
			}

			const params = new URLSearchParams(window.location.search);
			const parentUrlParam = params.get("parentUrl");
			if (parentUrlParam) {
				return { url: parentUrlParam, method: "URL Parameter" };
			}
			return {
				url: window.location.href,
				method: "Fallback, Current URL (window.location.href)",
			};
		}
		
		// Prod Exp: https://experience.elluciancloud.com/rhc/
		// Test Exp: https://experience-test.elluciancloud.com/rhctest/

		function getEnv(parentUrl) {
			try {
				const host = new URL(parentUrl).hostname.toLowerCase();
				if (host === "experience-test.elluciancloud.com") return "Test";
				if (host === "experience.elluciancloud.com") return "Prod";
				return "Unknown";
			} catch {
				return "Unknown";
			}
		}

		const { url: finalParentUrl, method } = getParentContext();
		const env = getEnv(finalParentUrl);
		const finalLinkUrl = env === "Test" ? urlTest : env === "Prod" ? urlProd : "";
		
		parentUrlEl.textContent = finalParentUrl;
		urlLinkEl.textContent = finalLinkUrl || "Unavailable";
		envEl.textContent = env;
		methodEl.textContent = method;

		if (finalLinkUrl) {
			bannerLink.href = finalLinkUrl;
		} else {
			bannerLink.removeAttribute("href");
			bannerLink.setAttribute("aria-disabled", "true");
		}
	</script>

</body>

</html>
