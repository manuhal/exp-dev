<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessRío Portal - Choose Version</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700;900&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --rio-gold: #f9c900;
      --rio-dark-gray: #414042;
      --rio-med-blue: #2A96C6;
      --rio-green: #33A961;
      --text: #ffffff;

      --rio-green-rgb: 51, 169, 97;
      --rio-med-blue-rgb: 42, 150, 198;
      --topbar-height: 64px;
    }

    body {
      font-family: "Source Sans 3", "Segoe UI", system-ui, -apple-system,
        BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--rio-dark-gray);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    .skip-link {
      position: absolute;
      left: 1rem;
      top: -3rem;
      z-index: 2000;
      background: #ffffff;
      color: #000000;
      padding: 0.5rem 0.75rem;
      border-radius: 0.25rem;
      text-decoration: none;
      font-weight: 600;
    }

    .skip-link:focus {
      top: 0.75rem;
    }

    .top-bar {
      height: var(--topbar-height);
      background: var(--rio-dark-gray);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 1030;
    }

    .main-panels {
      min-height: calc(100vh - var(--topbar-height));
      margin-top: var(--topbar-height);
    }

    .portal-panel {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      min-height: 50vh;
      text-decoration: none;
      color: var(--text);
    }

    .portal-panel:focus-visible {
      outline: 4px solid var(--rio-gold);
      outline-offset: -4px;
    }

    .panel-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1);
      transition: transform 0.7s ease;
    }

    .portal-panel:hover .panel-image {
      transform: scale(1.05);
    }

    .panel-overlay {
      position: absolute;
      inset: 0;
      transition: background-color 0.3s ease;
    }

    .overlay-green {
      background: rgba(var(--rio-green-rgb), 0.9);
    }

    .overlay-blue {
      background: rgba(var(--rio-med-blue-rgb), 0.9);
    }

    .portal-panel.left:hover .overlay-green {
      background: rgba(var(--rio-green-rgb), 0.75);
    }

    .portal-panel.right:hover .overlay-blue {
      background: rgba(var(--rio-med-blue-rgb), 0.75);
    }

    .panel-content {
      position: relative;
      z-index: 2;
      padding: 1.5rem;
    }

    .panel-badge {
      display: inline-block;
      background-color: #1a1a1a;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 24px;
      border-radius: 9999px;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 40%);
    }

    .panel-title {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-top: 1.5rem;
      margin-bottom: 0;
      text-transform: uppercase;
    }

    .panel-subtitle {
      font-size: 2rem;
      font-weight: 300;
      margin-top: 0.5rem;
      margin-bottom: 0;
    }

    @media (min-width: 768px) {
      .panel-title {
        font-size: 4rem;
      }

      .panel-subtitle {
        font-size: 2.3rem;
      }
    }

    @media (min-width: 992px) {
      .panel-badge {
        padding: 10px 32px;
      }

      .portal-panel {
        min-height: calc(100vh - var(--topbar-height));
      }

      .panel-title {
        font-size: 4.8rem;
      }

      .panel-subtitle {
        font-size: 2.5rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .panel-image,
      .panel-overlay {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="top-bar fixed-top d-flex align-items-center justify-content-center">
    <img src="https://www.riohondo.edu/wp-content/uploads/2023/08/AccessRIO.png" alt="AccessRío" style="height: 40px;">
  </header>

  <main id="main-content" class="container-fluid p-0" tabindex="-1">
    <h1 class="visually-hidden">AccessRío Portal version selection</h1>
    <div class="row g-0 main-panels">
      <div class="col-12 col-lg-6">
        <a href="https://accessrio.riohondo.edu" class="portal-panel left" aria-label="Visit current AccessRío Portal">
          <img src="https://page.riohondo.edu/wp-content/uploads/2026/05/current-accessrio.webp" alt=""
            class="panel-image">
          <div class="panel-overlay overlay-green"></div>
          <div class="panel-content">
            <span class="panel-badge">Visit</span>
            <h2 class="panel-title">Current</h2>
            <p class="panel-subtitle">AccessRío Portal</p>
          </div>
        </a>
      </div>

      <div class="col-12 col-lg-6">
        <a href="https://experience-test.elluciancloud.com/rhctest/" class="portal-panel right"
          aria-label="Preview upcoming AccessRío Portal">
          <img src="https://page.riohondo.edu/wp-content/uploads/2026/05/upcoming-accessrio-noid-nosurvey.webp" alt=""
            class="panel-image">
          <div class="panel-overlay overlay-blue"></div>
          <div class="panel-content">
            <span class="panel-badge">Preview</span>
            <h2 class="panel-title">Coming Soon</h2>
            <p class="panel-subtitle">AccessRío Portal</p>
          </div>
        </a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>

</html>
